<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cc-switch 统计悬浮窗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --panel-bg: rgba(14, 16, 24, 0.92);
            --panel-border: rgba(255,255,255,0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-primary: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --success: #10b981;
            --error: #f43f5e;
            --warning: #f59e0b;
            --font-outfit: 'Outfit','Inter',sans-serif;
            --font-inter: 'Inter',sans-serif;

            /* Lyric bar heights */
            --h-pill: 36px;
            --h-full: 300px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: transparent;
            font-family: var(--font-inter);
            overflow: hidden;
            user-select: none;
        }

        /* ═══════════════════════════════════════════════════════
           ROOT — switches between pill and full card
        ═══════════════════════════════════════════════════════ */
        .widget-root {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            border-radius: 18px;
            border: 1px solid var(--panel-border);
            background: var(--panel-bg);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            box-shadow: 0 8px 40px rgba(0,0,0,.75),
                        inset 0 0 0 0.5px rgba(255,255,255,.06);
            overflow: hidden;
            transition: border-radius .3s ease;
            position: relative;   /* anchor for absolute pill-bar */
        }

        /* ═══════════════════════════════════════════════════════
           EXPANDED STATE — full card
        ═══════════════════════════════════════════════════════ */

        /* Header drag bar */
        .card-header {
            -webkit-app-region: drag;
            display: flex; align-items: center;
            height: 44px; padding: 0 10px; gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,.06);
            flex-shrink: 0;
        }

        .win-controls {
            -webkit-app-region: no-drag;
            display: flex; align-items: center; gap: 6px; flex-shrink: 0;
        }
        .win-dot {
            width: 12px; height: 12px; border-radius: 50%; border: none;
            cursor: pointer; outline: none;
            display: flex; align-items: center; justify-content: center;
            transition: opacity .15s, transform .15s;
            overflow: hidden;
        }
        .win-dot:hover { opacity: .8; transform: scale(1.1); }
        .win-dot.close    { background: #ff5f57; }
        .win-dot.minimize { background: #ffbd2e; }
        .win-dot svg { opacity: 0; transition: opacity .15s; }
        .win-controls:hover .win-dot svg { opacity: 1; }

        .card-title-area { flex: 1; min-width: 0; }
        .card-title {
            font-family: var(--font-outfit); font-size: .8rem; font-weight: 600;
            color: var(--text-primary); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .card-subtitle { font-size: .63rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .preset-select {
            -webkit-app-region: no-drag;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.1);
            color: var(--text-secondary);
            padding: .2rem .35rem; border-radius: 6px; font-size: .7rem;
            outline: none; cursor: pointer;
            font-family: var(--font-inter); font-weight: 500; flex-shrink: 0;
        }
        .preset-select option { background: #111218; color: var(--text-primary); }

        /* Collapse button (expanded view) */
        .btn-collapse-full {
            -webkit-app-region: no-drag;
            width: 24px; height: 24px; flex-shrink: 0;
            background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
            border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); outline: none;
            transition: background .15s, color .15s;
        }
        .btn-collapse-full:hover { background: rgba(255,255,255,.1); color: var(--text-secondary); }

        /* Card body */
        .card-body {
            flex: 1; display: flex; flex-direction: column;
            padding: 10px 12px 6px; gap: 6px;
            overflow: hidden; min-height: 0;
        }

        .metrics-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 8px; flex-shrink: 0; }
        .metric-token { display: flex; align-items: baseline; gap: 4px; }
        .metric-value {
            font-family: var(--font-outfit); font-size: 1.65rem; font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1; letter-spacing: -1px; font-variant-numeric: tabular-nums;
        }
        .metric-unit { font-size: .7rem; color: var(--text-muted); font-weight: 500; margin-bottom: 2px; }
        .metric-cost { font-size: .88rem; font-weight: 600; color: var(--success); font-family: var(--font-outfit); }

        /* Breakdown */
        .breakdown-row { display: flex; gap: 7px; flex-wrap: wrap; flex-shrink: 0; }
        .breakdown-item { display: flex; align-items: center; gap: 4px; font-size: .62rem; color: var(--text-muted); font-weight: 500; }
        .breakdown-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

        /* Model stats */
        .model-stats { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
        .model-row {
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px; padding: 3px 8px;
            background: rgba(255,255,255,.03); border-radius: 6px;
            border: 1px solid rgba(255,255,255,.05);
        }
        .model-name { font-size: .67rem; color: var(--text-secondary); font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .model-tokens { font-size: .67rem; font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; white-space: nowrap; }
        .model-bar-wrap { width: 50px; height: 3px; background: rgba(255,255,255,.08); border-radius: 2px; flex-shrink: 0; }
        .model-bar-fill { height: 100%; border-radius: 2px; background: var(--accent-gradient); transition: width .5s ease; }

        /* Sparkline */
        .sparkline-container { flex: 1; position: relative; min-height: 0; }
        .sparkline-container canvas { width: 100% !important; height: 100% !important; }

        /* Footer */
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 5px 12px 7px;
            border-top: 1px solid rgba(255,255,255,.05); flex-shrink: 0;
        }
        .footer-status { display: flex; align-items: center; gap: 5px; font-size: .61rem; color: var(--text-muted); }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); }
        .status-dot.ok      { background: var(--success); animation: blinkGreen 2s infinite; }
        .status-dot.error   { background: var(--error); }
        .status-dot.loading { background: var(--warning); animation: blinkYellow 1s infinite; }
        @keyframes blinkGreen  { 0%,100%{opacity:1}50%{opacity:.4} }
        @keyframes blinkYellow { 0%,100%{opacity:1}50%{opacity:.3} }
        .footer-hint { font-size: .6rem; color: var(--text-muted); }

        /* Shimmer */
        @keyframes shimmer { 0%{opacity:.4}50%{opacity:.85}100%{opacity:.4} }
        .shimmer { animation: shimmer 1.2s infinite ease-in-out; }

        /* ═══════════════════════════════════════════════════════
           COLLAPSED — lyrics-bar pill
        ═══════════════════════════════════════════════════════ */
        .pill-bar {
            /* Absolutely positioned over widget-root — hidden in expanded mode */
            position: absolute;
            inset: 0;             /* fill widget-root exactly */
            display: none;
            -webkit-app-region: drag;
            align-items: center;
            padding: 0 10px 0 12px;
            gap: 8px;
            overflow: hidden;
            z-index: 10;
        }

        /* Traffic light dots — ultra small, appear on hover */
        .pill-dots {
            -webkit-app-region: no-drag;
            display: flex; align-items: center; gap: 4px;
            flex-shrink: 0; opacity: 0;
            transition: opacity .2s ease;
        }
        .pill-bar:hover .pill-dots { opacity: 1; }
        .pill-dot {
            width: 8px; height: 8px; border-radius: 50%; border: none;
            cursor: pointer; outline: none;
            transition: transform .15s, filter .15s;
        }
        .pill-dot:hover { transform: scale(1.2); filter: brightness(1.2); }
        .pill-dot.close    { background: #ff5f57; }
        .pill-dot.minimize { background: #ffbd2e; }

        /* Card label */
        .pill-label {
            font-family: var(--font-outfit); font-size: .72rem; font-weight: 600;
            color: rgba(255,255,255,.55); white-space: nowrap;
            flex-shrink: 0; max-width: 100px; overflow: hidden; text-overflow: ellipsis;
        }

        /* Separator */
        .pill-sep {
            width: 1px; height: 14px;
            background: rgba(255,255,255,.12); flex-shrink: 0;
        }

        /* Total token display */
        .pill-total {
            display: flex; align-items: baseline; gap: 3px; flex-shrink: 0;
        }
        .pill-token-num {
            font-family: var(--font-outfit); font-size: 1.05rem; font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -.5px; font-variant-numeric: tabular-nums;
        }
        .pill-token-unit { font-size: .6rem; color: var(--text-muted); font-weight: 500; }

        /* Pill sparkline trend chart */
        .pill-sparkline-container {
            flex: 1; height: 18px; position: relative; min-width: 0;
            margin-right: 4px;
        }
        .pill-sparkline-container canvas {
            width: 100% !important; height: 100% !important;
        }

        /* Expand button in pill */
        .pill-expand {
            -webkit-app-region: no-drag;
            width: 20px; height: 20px; flex-shrink: 0;
            background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
            border-radius: 5px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); outline: none;
            transition: background .15s, color .15s; opacity: 0;
            transition: opacity .2s ease, background .15s;
        }
        .pill-bar:hover .pill-expand { opacity: 1; }
        .pill-expand:hover { background: rgba(255,255,255,.12); color: var(--text-secondary); }

        /* ── State: collapsed ─────────────────────────────────── */
        body.collapsed .widget-root { border-radius: 10px; }
        body.collapsed .card-header,
        body.collapsed .card-body,
        body.collapsed .card-footer { display: none !important; }
        body.collapsed .pill-bar    { display: flex !important; }

        /* ── No-card state ─────────────────────────────────────── */
        .no-card-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; gap: 6px; color: var(--text-muted); font-size: .8rem;
            text-align: center; padding: 1rem;
        }

        /* ── Tooltip ───────────────────────────────────────────── */
        .custom-tooltip {
            position: fixed; display: none;
            background: rgba(12,15,24,.98); border: 1px solid rgba(255,255,255,.12);
            border-radius: 10px; padding: 8px 10px;
            pointer-events: none; z-index: 9999; font-size: .7rem; font-family: var(--font-inter);
            min-width: 130px; box-shadow: 0 8px 24px rgba(0,0,0,.7);
        }
        .tooltip-title { color: var(--text-secondary); font-weight: 600; margin-bottom: 5px; font-size: .67rem; border-bottom: 1px solid rgba(255,255,255,.08); padding-bottom: 4px; }
        .tooltip-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 1.5px 0; }
        .tooltip-label { display: flex; align-items: center; gap: 5px; color: var(--text-muted); }
        .tooltip-color-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .tooltip-val { color: var(--text-primary); font-weight: 600; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

<!-- ───────────────── EXPANDED CARD ───────────────────────── -->
<div class="widget-root" id="widgetRoot">

    <!-- ── PILL BAR (inside widget-root, shown when collapsed) ── -->
    <div class="pill-bar" id="pillBar">
        <div class="pill-dots">
            <button class="pill-dot close"    id="pillClose"></button>
            <button class="pill-dot minimize" id="pillMinimize"></button>
        </div>
        <span class="pill-label" id="pillLabel">–</span>
        <div class="pill-sep"></div>
        <div class="pill-total">
            <span class="pill-token-num" id="pillTokenNum">0</span>
            <span class="pill-token-unit">tokens</span>
        </div>
        <div class="pill-sep"></div>
        <div class="pill-sparkline-container"><canvas id="pillSparklineCanvas"></canvas></div>
        <button class="pill-expand" id="btnExpand" title="展开">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
    </div>

    <div class="card-header">
        <div class="win-controls">
            <button class="win-dot close" id="btnClose">
                <svg width="6" height="6" viewBox="0 0 10 10" fill="none">
                    <line x1="1" y1="1" x2="9" y2="9" stroke="#7d1f1f" stroke-width="2" stroke-linecap="round"/>
                    <line x1="9" y1="1" x2="1" y2="9" stroke="#7d1f1f" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="win-dot minimize" id="btnMinimize">
                <svg width="6" height="6" viewBox="0 0 10 10" fill="none">
                    <line x1="1" y1="5" x2="9" y2="5" stroke="#7d5a00" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="card-title-area">
            <div class="card-title"  id="cardTitle">加载中…</div>
            <div class="card-subtitle" id="cardSubtitle">–</div>
        </div>
        <select class="preset-select" id="presetSelect" onchange="onPresetChange(this.value)">
            <option value="today">今日</option>
            <option value="1d" selected>1d</option>
            <option value="7d">7d</option>
            <option value="14d">14d</option>
            <option value="30d">30d</option>
        </select>
        <button class="btn-collapse-full" id="btnCollapse" title="折叠为横条">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <polyline points="18 15 12 9 6 15"/>
            </svg>
        </button>
    </div>

    <div class="card-body" id="cardBody">
        <!-- Main metrics -->
        <div class="metrics-row">
            <div class="metric-token">
                <span class="metric-value shimmer" id="metricTotal">–</span>
                <span class="metric-unit">tokens</span>
            </div>
            <span class="metric-cost" id="metricCost">$–</span>
        </div>

        <!-- Token type breakdown -->
        <div class="breakdown-row">
            <div class="breakdown-item"><div class="breakdown-dot" style="background:rgba(59,130,246,.85)"></div><span id="bdInput">输入 –</span></div>
            <div class="breakdown-item"><div class="breakdown-dot" style="background:rgba(139,92,246,.85)"></div><span id="bdOutput">输出 –</span></div>
            <div class="breakdown-item"><div class="breakdown-dot" style="background:rgba(16,185,129,.85)"></div><span id="bdWrite">缓写 –</span></div>
            <div class="breakdown-item"><div class="breakdown-dot" style="background:rgba(251,191,36,.85)"></div><span id="bdRead">缓读 –</span></div>
        </div>

        <!-- Per-model breakdown -->
        <div class="model-stats" id="modelStats"></div>

        <!-- Sparkline -->
        <div class="sparkline-container"><canvas id="sparklineCanvas"></canvas></div>
    </div>

    <div class="card-footer">
        <div class="footer-status">
            <div class="status-dot loading" id="statusDot"></div>
            <span id="statusText">正在加载…</span>
        </div>
        <span class="footer-hint" id="refreshHint">30s 自动刷新</span>
    </div>
</div>

<!-- Tooltip -->
<div class="custom-tooltip" id="customTooltip">
    <div class="tooltip-title" id="tooltipTitle"></div>
    <div id="tooltipRows"></div>
</div>

<script>
(function() {
    // ── Constants ─────────────────────────────────────────────
    const SC = {
        input:      'rgba(59,130,246,0.9)',
        output:     'rgba(139,92,246,0.9)',
        cacheWrite: 'rgba(16,185,129,0.9)',
        cacheRead:  'rgba(251,191,36,0.9)',
        cost:       'rgba(248,84,84,0.9)',
    };
    const EXPANDED_H  = 300;
    const COLLAPSED_H = 36;
    let REFRESH_MS    = 30000;

    function applyRefreshInterval(val) {
        let ms = Number(val);
        if (isNaN(ms)) ms = 30000;
        
        REFRESH_MS = ms;
        const hintEl = document.getElementById('refreshHint');
        
        clearTimeout(refreshTimer);
        
        if (ms === 0) {
            if (hintEl) hintEl.textContent = '已暂停自动刷新';
        } else {
            const sec = ms / 1000;
            if (hintEl) hintEl.textContent = `${sec}s 自动刷新`;
            scheduleRefresh();
        }
    }

    // ── State ─────────────────────────────────────────────────
    let cardConfig   = null;
    let devices      = [];
    let chartInst    = null;
    let pillChartInst = null;
    let refreshTimer = null;
    let isCollapsed  = false;
    let prevTotal    = 0;
    let rollRaf      = null;

    // ── Init ──────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
        // Expanded controls
        document.getElementById('btnClose').onclick    = doClose;
        document.getElementById('btnMinimize').onclick = doMinimize;
        document.getElementById('btnCollapse').onclick = collapse;

        // Pill controls
        document.getElementById('pillClose').onclick    = doClose;
        document.getElementById('pillMinimize').onclick = doMinimize;
        document.getElementById('btnExpand').onclick    = expand;

        loadStorage();

        const cardId = new URLSearchParams(window.location.search).get('card');
        if (!cardId) { showError(); return; }

        const stored = safeJSON(localStorage.getItem('cc_aggregator_dashboard_cards')) || [];
        cardConfig = stored.find(c => c.id === cardId);
        if (!cardConfig) { showError(`未找到卡片 (${cardId})`); return; }

        applyMeta();
        document.getElementById('presetSelect').value = cardConfig.preset || '1d';

        // Load refresh interval from storage
        const storedInterval = localStorage.getItem('cc_aggregator_db_refresh_interval');
        if (storedInterval !== null) {
            applyRefreshInterval(storedInterval);
        } else {
            applyRefreshInterval(30000);
        }

        fetchAndRender();
    });

    window.addEventListener('storage', (e) => {
        if (e.key === 'cc_aggregator_db_refresh_interval') {
            applyRefreshInterval(e.newValue);
        }
    });

    function doClose() {
        if (window.electronAPI && window.electronAPI.closeWidget) {
            window.electronAPI.closeWidget();
        } else {
            window.close();
        }
    }
    function doMinimize() {
        if (window.electronAPI && window.electronAPI.minimizeWidget) {
            window.electronAPI.minimizeWidget();
        }
    }

    // ── Storage ───────────────────────────────────────────────
    function loadStorage() {
        devices = safeJSON(localStorage.getItem('cc_aggregator_devices')) || [
            { name: '本地设备', ip: '127.0.0.1:15722' }
        ];
    }
    function safeJSON(s) { try { return JSON.parse(s); } catch { return null; } }

    // ── Metadata ──────────────────────────────────────────────
    function applyMeta() {
        const APP = { all:'全部项目', claude:'Claude', codex:'Codex', gemini:'Gemini', opencode:'OpenCode' };
        let devName = '所有设备';
        if (cardConfig.device && cardConfig.device !== 'all') {
            const d = devices.find(x => x.ip === cardConfig.device);
            devName = d ? d.name : cardConfig.device;
        }
        const appName = APP[cardConfig.app] || cardConfig.app || '全部项目';
        const title = cardConfig.name || '统计卡片';
        document.getElementById('cardTitle').textContent    = title;
        document.getElementById('cardSubtitle').textContent = `${devName} · ${appName}`;
        document.getElementById('pillLabel').textContent    = title;
    }

    // ── Collapse / Expand ─────────────────────────────────────
    function collapse() {
        isCollapsed = true;
        document.body.classList.add('collapsed');
        window.electronAPI?.resizeWidget?.(360, COLLAPSED_H);
    }
    function expand() {
        isCollapsed = false;
        document.body.classList.remove('collapsed');
        window.electronAPI?.resizeWidget?.(360, EXPANDED_H);
    }

    // ── Preset ────────────────────────────────────────────────
    async function onPresetChange(preset) {
        cardConfig.preset = preset;
        const arr = safeJSON(localStorage.getItem('cc_aggregator_dashboard_cards')) || [];
        const i = arr.findIndex(c => c.id === cardConfig.id);
        if (i !== -1) {
            arr[i].preset = preset;
            localStorage.setItem('cc_aggregator_dashboard_cards', JSON.stringify(arr));
            if (window.electronAPI && window.electronAPI.saveConfig && window.electronAPI.loadConfig) {
                try {
                    const currentConfig = await window.electronAPI.loadConfig() || {};
                    currentConfig.dashboardCards = arr;
                    window.electronAPI.saveConfig(currentConfig);
                } catch (e) {
                    console.error("Failed to save config from widget preset change:", e);
                }
            }
        }
        fetchAndRender();
        scheduleRefresh();
    }
    window.onPresetChange = onPresetChange;

    // ── Time ──────────────────────────────────────────────────
    function getRange(preset) {
        const end = Math.floor(Date.now() / 1000);
        const now = new Date();
        const mn  = Math.floor(new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime() / 1000);
        const map = { today: mn, '1d': end-86400, '7d': mn-6*86400, '14d': mn-13*86400, '30d': mn-29*86400 };
        return { startSec: map[preset] ?? mn, endSec: end };
    }

    // ── Fetch ─────────────────────────────────────────────────
    async function fetchAndRender() {
        setStatus('loading', '正在刷新…');
        document.getElementById('metricTotal').classList.add('shimmer');

        const { startSec, endSec } = getRange(cardConfig.preset || '1d');
        const app = cardConfig.app || 'all';

        const devs = cardConfig.device === 'all'
            ? devices
            : devices.filter(d => d.ip === cardConfig.device);

        if (!devs.length) { setStatus('error', '无可用设备'); return; }

        const results = await Promise.all(devs.map(async dev => {
            try {
                let url = `http://${dev.ip}/api/usage?start_time=${startSec}&end_time=${endSec}`;
                if (app !== 'all') url += `&app_type=${encodeURIComponent(app)}`;
                const r = await fetch(url, { signal: AbortSignal.timeout(5000) });
                return r.ok ? r.json() : null;
            } catch { return null; }
        }));

        const valid = results.filter(Boolean);
        if (!valid.length) { setStatus('error', '数据获取失败'); document.getElementById('metricTotal').classList.remove('shimmer'); return; }

        // ── Aggregate ──────────────────────────────────────────
        let totIn=0, totOut=0, totWrite=0, totRead=0, totCost=0;
        const trendsMap = {};
        if (cardConfig.preset === 'today') {
            const now = new Date();
            const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            for (let h = 0; h <= now.getHours(); h++) {
                const d = new Date(start.getTime() + h * 3600 * 1000);
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0');
                const k = `${mm}-${dd} ${hh}:00`;
                trendsMap[k] = { input: 0, output: 0, cacheWrite: 0, cacheRead: 0, cost: 0 };
            }
        } else if (cardConfig.preset === '1d') {
            const now = new Date();
            const currentHourStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours());
            for (let i = 23; i >= 0; i--) {
                const d = new Date(currentHourStart.getTime() - i * 3600 * 1000);
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0');
                const k = `${mm}-${dd} ${hh}:00`;
                trendsMap[k] = { input: 0, output: 0, cacheWrite: 0, cacheRead: 0, cost: 0 };
            }
        }
        const modelsMap = {};   // model_name → { tokens, cost }

        valid.forEach(data => {
            const s = data.summary || {};
            totIn    += s.input_tokens          || 0;
            totOut   += s.output_tokens         || 0;
            totWrite += s.cache_creation_tokens || 0;
            totRead  += s.cache_read_tokens     || 0;
            totCost  += s.total_cost            || 0;

            (data.trends || []).forEach(pt => {
                const k = pt.date;
                if (!trendsMap[k]) trendsMap[k] = {input:0,output:0,cacheWrite:0,cacheRead:0,cost:0};
                trendsMap[k].input      += pt.input_tokens          || 0;
                trendsMap[k].output     += pt.output_tokens         || 0;
                trendsMap[k].cacheWrite += pt.cache_creation_tokens || 0;
                trendsMap[k].cacheRead  += pt.cache_read_tokens     || 0;
                trendsMap[k].cost       += pt.cost                  || 0;
            });

            // Per-model aggregation from model_stats
            // NOTE: ms.total_tokens = input+output+cache_creation (excludes cache_read!)
            // We compute real tokens with the same formula as the summary total:
            // real = input + output + cache_creation + cache_read
            (data.model_stats || []).forEach(ms => {
                const name = ms.model_name || 'unknown';
                if (!modelsMap[name]) modelsMap[name] = { tokens: 0, cost: 0 };
                const realTokens = (ms.input_tokens   || 0)
                                 + (ms.output_tokens  || 0)
                                 + (ms.cache_creation || 0)
                                 + (ms.cache_read     || 0);
                modelsMap[name].tokens += realTokens;
                modelsMap[name].cost   += ms.cost || 0;
            });
        });

        const newTotal = totIn + totOut + totWrite + totRead;

        // Animate counters
        animateRoll(prevTotal, newTotal);
        prevTotal = newTotal;

        // Expanded view updates
        document.getElementById('metricTotal').classList.remove('shimmer');
        document.getElementById('metricCost').textContent = '$' + totCost.toFixed(4);
        document.getElementById('bdInput').textContent    = '输入 ' + fmtShort(totIn);
        document.getElementById('bdOutput').textContent   = '输出 ' + fmtShort(totOut);
        document.getElementById('bdWrite').textContent    = '缓写 ' + fmtShort(totWrite);
        document.getElementById('bdRead').textContent     = '缓读 ' + fmtShort(totRead);

        renderModelStats(modelsMap, newTotal);
        renderSparkline(trendsMap);
        renderPillSparkline(trendsMap);
        setStatus('ok', `已更新 ${fmtTime(new Date())}`);
    }

    // ── Model stats list (expanded view) ─────────────────────
    function renderModelStats(modelsMap, totalTokens) {
        const container = document.getElementById('modelStats');
        const sorted = Object.entries(modelsMap).sort((a,b) => b[1].tokens - a[1].tokens).slice(0, 5);
        if (!sorted.length) { container.innerHTML = ''; return; }

        container.innerHTML = sorted.map(([name, data]) => {
            const pct = totalTokens > 0 ? (data.tokens / totalTokens * 100) : 0;
            return `
            <div class="model-row">
                <span class="model-name" title="${esc(name)}">${esc(name)}</span>
                <div class="model-bar-wrap"><div class="model-bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
                <span class="model-tokens">${fmtComma(data.tokens)}</span>
            </div>`;
        }).join('');
    }

    // ── Pill mini sparkline (pill view) ───────────────────────
    function renderPillSparkline(trendsMap) {
        const canvas = document.getElementById('pillSparklineCanvas');
        if (!canvas) return;
        if (pillChartInst) { pillChartInst.destroy(); pillChartInst = null; }

        const sorted = Object.keys(trendsMap).sort();
        let labels = [], totalD = [];

        if (!sorted.length) {
            labels = ['0','1','2','3','4'];
            totalD = [0,0,0,0,0];
        } else {
            sorted.forEach(k => {
                const v = trendsMap[k];
                labels.push(k.slice(-5));
                totalD.push((v.input || 0) + (v.output || 0) + (v.cacheWrite || 0) + (v.cacheRead || 0));
            });
        }

        pillChartInst = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Total Tokens',
                    data: totalD,
                    borderColor: 'rgba(59, 130, 246, 0.85)',
                    backgroundColor: 'rgba(59, 130, 246, 0.05)',
                    borderWidth: 1.5,
                    pointRadius: ctx => ctx.chart.data.labels.length === 1 ? 3 : 0,
                    pointHoverRadius: 0,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false }
                },
                scales: {
                    x: { display: false },
                    y: { display: false }
                }
            }
        });
    }

    // ── Number roll animation ─────────────────────────────────
    function animateRoll(from, to) {
        if (rollRaf) { cancelAnimationFrame(rollRaf); rollRaf = null; }
        const DURATION = 900;
        const t0 = performance.now();
        const elCard = document.getElementById('metricTotal');
        const elPill = document.getElementById('pillTokenNum');

        function ease(t) { return 1 - Math.pow(1-t, 3); }

        function step(now) {
            const progress = Math.min((now - t0) / DURATION, 1);
            const val = Math.round(from + (to - from) * ease(progress));
            const str = fmtComma(val);
            elCard.textContent = str;
            elPill.textContent = str;
            if (progress < 1) {
                rollRaf = requestAnimationFrame(step);
            } else {
                elCard.textContent = fmtComma(to);
                elPill.textContent = fmtComma(to);
                rollRaf = null;
            }
        }
        rollRaf = requestAnimationFrame(step);
    }

    // ── Sparkline ─────────────────────────────────────────────
    function renderSparkline(trendsMap) {
        const canvas = document.getElementById('sparklineCanvas');
        if (!canvas) return;
        if (chartInst) { chartInst.destroy(); chartInst = null; }

        const sorted = Object.keys(trendsMap).sort();
        let labels=[], iD=[], oD=[], wD=[], rD=[], cD=[];

        if (!sorted.length) {
            labels=['0','1','2','3','4'];
            iD=oD=wD=rD=cD=[0,0,0,0,0];
        } else {
            sorted.forEach(k => {
                const v=trendsMap[k];
                labels.push(k.slice(-5));
                iD.push(v.input); oD.push(v.output); wD.push(v.cacheWrite); rD.push(v.cacheRead); cD.push(v.cost);
            });
        }

        const mk = (lbl,data,color,yid) => ({
            label:lbl, data, borderColor:color,
            backgroundColor:color.replace('0.9)','0.07)'),
            borderWidth:1.5,
            pointRadius: ctx => ctx.chart.data.labels.length === 1 ? 3 : 0,
            pointHoverRadius:3,
            tension:0.4, fill:false, yAxisID:yid,
        });

        const ttEl = document.getElementById('customTooltip');
        const colors = Object.values(SC);
        const names  = ['输入','输出','缓存写入','缓存命中','估算成本($)'];

        chartInst = new Chart(canvas.getContext('2d'), {
            type:'line',
            data:{ labels, datasets:[
                mk('输入',iD,SC.input,'yT'), mk('输出',oD,SC.output,'yT'),
                mk('缓存写入',wD,SC.cacheWrite,'yT'), mk('缓存命中',rD,SC.cacheRead,'yT'),
                mk('估算成本($)',cD,SC.cost,'yC'),
            ]},
            options:{
                responsive:true, maintainAspectRatio:false,
                interaction:{mode:'index',intersect:false},
                animation:{duration:400},
                plugins:{
                    legend:{display:false},
                    tooltip:{
                        enabled:false,
                        external({chart,tooltip:t}){
                            if(t.opacity===0){ttEl.style.display='none';return;}
                            document.getElementById('tooltipTitle').textContent = t.title?.[0]??'';
                            const rows=document.getElementById('tooltipRows');
                            rows.innerHTML='';
                            t.dataPoints?.forEach((dp,i)=>{
                                const val = i===4 ? '$'+Number(dp.raw).toFixed(4) : fmtShort(dp.raw);
                                const row=document.createElement('div');
                                row.className='tooltip-row';
                                row.innerHTML=`<div class="tooltip-label"><div class="tooltip-color-dot" style="background:${colors[i]}"></div><span>${names[i]}</span></div><span class="tooltip-val">${val}</span>`;
                                rows.appendChild(row);
                            });
                            ttEl.style.display='block';
                            const rc=chart.canvas.getBoundingClientRect();
                            let x=rc.left+t.caretX+10, y=rc.top+t.caretY-20;
                            const tw=ttEl.offsetWidth||150, th=ttEl.offsetHeight||120;
                            if(x+tw>window.innerWidth-6)x=rc.left+t.caretX-tw-10;
                            if(y+th>window.innerHeight-6)y=window.innerHeight-th-6;
                            if(x<4)x=4; if(y<4)y=4;
                            ttEl.style.left=x+'px'; ttEl.style.top=y+'px';
                        }
                    }
                },
                scales:{
                    x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:9},maxTicksLimit:7}},
                    yT:{position:'left',grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:9},callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v}},
                    yC:{position:'right',grid:{display:false},ticks:{color:SC.cost,font:{size:9},callback:v=>'$'+v.toFixed(2)}},
                }
            }
        });
    }

    // ── Formatters ────────────────────────────────────────────
    function fmtComma(n) { return Math.round(n).toLocaleString('en-US'); }
    function fmtShort(n) {
        if (n>=1e6) return (n/1e6).toFixed(1)+'M';
        if (n>=1e3) return (n/1e3).toFixed(0)+'k';
        return String(n||0);
    }
    function fmtTime(d) { return [d.getHours(),d.getMinutes(),d.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':'); }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ── Status ────────────────────────────────────────────────
    function setStatus(type, text) {
        document.getElementById('statusDot').className  = 'status-dot ' + type;
        document.getElementById('statusText').textContent = text;
    }

    // ── Auto-refresh ──────────────────────────────────────────
    function scheduleRefresh() {
        clearTimeout(refreshTimer);
        if (REFRESH_MS > 0) {
            refreshTimer = setTimeout(()=>{ fetchAndRender(); scheduleRefresh(); }, REFRESH_MS);
        }
    }

    // ── Error state ───────────────────────────────────────────
    function showError(msg) {
        document.getElementById('cardBody').innerHTML = `
            <div class="no-card-state">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M12 8v4M12 16h.01"/></svg>
                <span>${msg||'未指定卡片'}</span>
            </div>`;
        setStatus('error', '未知卡片');
    }
})();
</script>
